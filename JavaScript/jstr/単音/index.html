<!DOCTYPE html>
<html>
<head>
    <title>Play Sound</title>
</head>
<body>
    <button id="CButton">C</button>
    <button id="DButton">D</button>
    <button id="EButton">E</button>
    <button id="FButton">F</button>
    <button id="GButton">G</button>
    <button id="AButton">A</button>
    <button id="BButton">B</button>
<script>
    const cButton = document.getElementById('CButton');
const dButton = document.getElementById('DButton');
const eButton = document.getElementById('EButton');
const fButton = document.getElementById('FButton');
const gButton = document.getElementById('GButton');
const aButton = document.getElementById('AButton');
const bButton = document.getElementById('BButton');

function playSound(frequency) {
    const audioContext = new AudioContext();
    const osc = audioContext.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = frequency;
    const destination = audioContext.destination;
    osc.connect(destination);
    osc.start();
    setTimeout(() => osc.stop(), 500);
}

cButton.addEventListener('click', () => playSound(261.63)); // ドの周波数
dButton.addEventListener('click', () => playSound(293.66)); // レの周波数
eButton.addEventListener('click', () => playSound(329.63)); // ミの周波数
fButton.addEventListener('click', () => playSound(349.23)); // ファの周波数
gButton.addEventListener('click', () => playSound(392.00)); // ソの周波数
aButton.addEventListener('click', () => playSound(440.00)); // ラの周波数
bButton.addEventListener('click', () => playSound(493.88)); // シの周波数

</script>

</body>
</html>
