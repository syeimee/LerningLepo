<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bezierCurveAnimation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="canvas"></canvas>
</body>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }
</style>


<script>
    class Utils {
        // 2点 p0,p1をt:1-tに内部する内分点(0 <= t <= 1)
        lerp(p0, p1, t) {
            const x = (1 - t) * p0.x + t * p1.x;
            const y = (1 - t) * p0.y + t * p1.y;
            return { x: x, y: y };
        }
    }
</script>

<script>
    const utils = new Utils();

    let canvas, ctx, animationId, lastTime, fps, interval;
    let p0, p1, cp0, cp1, r, points, mouse, draggablePoint, unit, limit, growth;

    setup();
    animate(0);

    window.addEventListener('resize', () => {
        setup();
        animate(0);
    })

    window.addEventListener('mousedown', mouseDown);
    window.addEventListener('mousemove', mouseMove);
    window.addEventListener('mouseup', mouseUp);



    function setup() {
        //アニメーションのdefault設定-------------------------------------
        canvas = document.querySelector('#canvas');
        ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.backgroundColor = "#222";
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#fff";
        animationId = null;
        lastTime = 0;
        fps = 7; // frame per second
        interval = 1000 / fps; // ms

        //-------------------------------------------------------------

        //制御点2つの３次ベジェ曲線のdefault設定-------------------------------------
        p0 = { x: canvas.width / 10, y: canvas.height / 10 };
        p1 = { x: canvas.width * 2 / 10, y: canvas.height * 8 / 10 };
        cp0 = { x: canvas.width * 8 / 10, y: canvas.height / 10 };
        cp1 = { x: canvas.width * 6 / 10, y: canvas.height * 9 / 10 };
        r = 5;
        points = [p0, p1, cp0, cp1];
        mouse = { x: null, y: null };
        draggablePoint = null;
        unit = 0.1;
        limit = 0;
        growth = unit;

        //-------------------------------------------------------------

    }

    function draw() {
        ctx.save();
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.bezierCurveTo(cp0.x, cp0.y, cp1.x, cp1.y, p1.x, p1.y);//3点のx,yを入れる
        ctx.stroke();
        ctx.restore();
        points.forEach(point => {
            ctx.beginPath();
            ctx.arc(point.x, point.y, r, 0, Math.PI * 2);
            ctx.fill();
        })

        // // p0 ==> cp1
        // ctx.beginPath();
        // ctx.moveTo(p0.x, p0.y);
        // ctx.lineTo(cp0.x,cp0.y);
        // ctx.stroke();
        // // p1 ==> cp1
        // ctx.beginPath();
        // ctx.moveTo(p1.x, p1.y);
        // ctx.lineTo(cp1.x,cp1.y);
        // ctx.stroke();

        bezier(p0, p1, cp0, cp1);
    }

    function update() {
        if (limit < 0 || 1 <= limit) growth *= -1;

        limit = (Math.floor((limit + growth) * 10000)) / 10000;
    }

    function animate(timestamp) {
        if (timestamp - lastTime > interval) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            draw();
            update();
            lastTime = timestamp;
        }
        animationId = requestAnimationFrame(animate);
    }


    function mouseDown(e) {
        mouse = { x: e.clientX, y: e.clientY };
        points.forEach(p => {
            const mouseOnPoint = Math.sqrt((p.x - mouse.x) ** 2 + (p.y - mouse.y) ** 2) < r;
            if (mouseOnPoint) {
                draggablePoint = p;
                // console.log(draggabelePoint);
            }
        })
    }

    function mouseMove(e) {
        if (draggablePoint) {
            draggablePoint.x = e.clientX;
            draggablePoint.y = e.clientY;
        }
    }

    function mouseUp() {
        draggablePoint = null;
    }

    function bezier(p0, p1, cp0, cp1) {
        let from = 0;//p0の初期値

        for (let t = 0; t <= limit; t = Math.floor((t + unit) * 10000) / 10000) {
            let q0 = utils.lerp(p0, cp0, t);
            let q1 = utils.lerp(cp0, cp1, t);
            let q2 = utils.lerp(p1, cp1, t);
            let qA = utils.lerp(q0, q1, t);
            let qB = utils.lerp(q1, q2, t);
            let q = utils.lerp(qA, qB, t);

            // q0 - q1 - q2
            ctx.save();
            ctx.strokeStyle = `hsl(${t * 360}, 100%, 50%)`;
            ctx.setLineDash([2, 2]);//破線の表現
            ctx.beginPath();
            ctx.moveTo(q0.x, q0.y);
            ctx.lineTo(q1.x, q1.y);
            ctx.lineTo(q2.x, q2.y);
            ctx.stroke();
            ctx.restore();

            //qA -qB
            ctx.save();
            ctx.strokeStyle = `hsl(${t * 360}, 100%, 50%)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(qA.x, qA.y);
            ctx.lineTo(qB.x, qB.y);
            ctx.stroke();
            ctx.restore();

            //q - q
            ctx.save();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(q.x, q.y);
            ctx.stroke();
            ctx.restore();
            from = q;
        }
    }
</script>




</html>
