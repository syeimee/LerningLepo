<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Modal Example</title>
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      width: 300px;
      height: 150px;
    }

    .modal-content {
      background-color: opacity(0);
      color:rgb(246, 255, 0);
      font-weight: bold;
      padding: 20px;
      width: 100%;
      height: 100%;
      text-align: center;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover,
    .close:focus {
      color: black;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button id="openModalBtn">絶対に押すなよ</button>

  <script>
   
    function createModal() {
      const modal = document.createElement('div');
      modal.classList.add('modal');
      modal.style.display = 'block'; 

     
      const randomTop = Math.random() * 80;  
      const randomLeft = Math.random() * 80; 
      modal.style.top = randomTop + 'vh'; 
      modal.style.left = randomLeft + 'vw'; 

      const modalContent = document.createElement('div');
      modalContent.classList.add('modal-content');
      modalContent.innerHTML = `
        <span class="close">&times;</span>
        <p>押すなって言ったじゃん</p>
      `;

      modalContent.querySelector('.close').onclick = function() {
        modal.remove();
      };

      modal.appendChild(modalContent);
      document.body.appendChild(modal);
    }

    document.getElementById('openModalBtn').onclick = function() {
        document.body.style.backgroundColor = 'red';
　      for (let i = 0; i < 300000; i++) {  
        setTimeout(createModal, i * 200);  
      }
    }
  </script>

</body>
</html>
